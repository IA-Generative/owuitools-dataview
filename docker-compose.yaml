services:
  data-query:
    build: .
    ports:
      - "8093:8093"
      - "8088:8088"
    env_file:
      - .env
    networks:
      - owui-net
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8093/healthz').raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 5

networks:
  owui-net:
    external: true
